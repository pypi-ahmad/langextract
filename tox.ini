[tox]
envlist = py310, py311, py312, format, lint-src, lint-tests
skip_missing_interpreters = True

[testenv]
setenv =
    PYTHONWARNINGS = ignore
deps =
    .[openai,dev,test]
commands =
    pytest -ra -m "not live_api and not requires_pip"

[testenv:format]
skip_install = true
deps =
    isort>=5.13.2
    pyink~=24.3.0
commands =
    isort langextract trafficmind tests --check-only --diff
    pyink langextract trafficmind tests --check --diff --config pyproject.toml

[testenv:imports]
skip_install = true
deps =
    import-linter>=2.0
commands =
    lint-imports --config pyproject.toml

[testenv:lint-src]
deps =
    pylint>=3.0.0
commands =
    pylint --rcfile=.pylintrc langextract trafficmind

[testenv:lint-tests]
deps =
    pylint>=3.0.0
commands =
    pylint --rcfile=tests/.pylintrc tests

[testenv:live-api]
basepython = python3.11
passenv =
    GEMINI_API_KEY
    LANGEXTRACT_API_KEY
    OPENAI_API_KEY
    GOOGLE_APPLICATION_CREDENTIALS
    GOOGLE_CLOUD_PROJECT
deps = .[all,dev,test]
commands =
    pytest tests/test_live_api.py -v -m live_api --maxfail=1

[testenv:ollama-integration]
basepython = python3.11
deps =
    .[openai,dev,test]
    requests>=2.25.0
commands =
    pytest tests/test_ollama_integration.py -v --tb=short

[testenv:plugin-integration]
basepython = python3.11
setenv =
    PIP_NO_INPUT = 1
    PIP_DISABLE_PIP_VERSION_CHECK = 1
deps =
    .[dev,test]
commands =
    pytest tests/provider_plugin_test.py::PluginE2ETest -v -m "requires_pip"

[testenv:plugin-smoke]
basepython = python3.11
deps =
    .[dev,test]
commands =
    pytest tests/provider_plugin_test.py::PluginSmokeTest -v

[testenv:build]
skip_install = true
deps =
    build>=1.2.1
    twine>=5.1.1
commands =
    python -m build --sdist --wheel --outdir {envtmpdir}/dist
    python -c "import pathlib, subprocess, sys; dist_dir = pathlib.Path(r'{envtmpdir}') / 'dist'; files = sorted(str(path) for path in dist_dir.iterdir()); sys.exit(subprocess.call([sys.executable, '-m', 'twine', 'check', *files]))"

[testenv:trafficmind-check]
deps =
passenv =
    TRAFFICMIND_*
commands =
    trafficmind-check
